            const baseDirCandidates = ["png_l85_87_b1_3/", "l85_87_b1_3/"];
            let baseDir = baseDirCandidates[0];
            const files = filesText
                .split(/\r?\n/)
                .map((s) => s.trim())
                .filter((s) => s && !s.startsWith("."));

            const overlaidName = "LineProfiles_overlaid.png";

            const q = document.getElementById("q");
            const overlaid = document.getElementById("overlaid");
            const gallery = document.getElementById("gallery");
            const count = document.getElementById("count");

            function pickBaseDir() {
                // overlaidName が存在する前提で、最初に読み込み成功した候補を採用
                return new Promise((resolve) => {
                    const tryNext = (index) => {
                        if (index >= baseDirCandidates.length) {
                            resolve(baseDirCandidates[0]);
                            return;
                        }

                        const candidate = baseDirCandidates[index];
                        const probe = new Image();
                        probe.onload = () => resolve(candidate);
                        probe.onerror = () => tryNext(index + 1);
                        probe.src = candidate + overlaidName + "?v=" + Date.now();
                    };

                    tryNext(0);
                });
            }

            function makeFigure(name) {
                const figure = document.createElement("figure");
                const link = document.createElement("a");
                link.href = baseDir + name;
                link.target = "_blank";
                link.rel = "noopener";

                const img = document.createElement("img");
                img.loading = "lazy";
                img.decoding = "async";
                img.alt = name;
                img.src = baseDir + name;

                link.appendChild(img);
                figure.appendChild(link);

                const caption = document.createElement("figcaption");
                caption.textContent = name;
                figure.appendChild(caption);

                return figure;
            }

            function render() {
                const query = (q.value || "").trim().toLowerCase();
                overlaid.innerHTML = "";
                gallery.innerHTML = "";
                let shown = 0;

                // overlaid は常に先頭表示（検索対象外にせず、検索に合致する場合だけ表示）
                if (!query || overlaidName.toLowerCase().includes(query)) {
                    if (files.includes(overlaidName)) {
                        overlaid.appendChild(makeFigure(overlaidName));
                        shown += 1;
                    }
                }

                for (const name of files) {
                    if (name === overlaidName) continue;
                    if (query && !name.toLowerCase().includes(query)) continue;

                    gallery.appendChild(makeFigure(name));
                    shown += 1;
                }

                const total = files.length;
                if (query) count.textContent = `表示: ${shown} / ${total}（検索: "${q.value}"）`;
                else count.textContent = `表示: ${shown} / ${total}`;
            }

            q.addEventListener("input", render);
            pickBaseDir().then((picked) => {
                baseDir = picked;
                render();
            });
        </script>
